<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Pen Plotter</title>
<style>
:root {
    --bg: #1e1e1e;
    --panel: #252526;
    --panel-2: #2d2d30;
    --border: #3e3e42;
    --text: #d4d4d4;
    --text-dim: #8a8a8a;
    --accent: #0e639c;
    --accent-hi: #1177bb;
    --danger: #c4444f;
    --canvas-bg: #f8f8f5;
    --canvas-grid: #e8e8e0;
}
* { box-sizing: border-box; }
html, body {
    margin: 0; padding: 0; height: 100%;
    font: 13px/1.35 -apple-system, "Segoe UI", system-ui, sans-serif;
    background: var(--bg); color: var(--text); overflow: hidden;
    user-select: none;
}
#app { display: grid; grid-template-columns: 260px 1fr 300px; height: 100vh; }
.panel { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
.panel:last-child { border-right: 0; border-left: 1px solid var(--border); }
.panel h2 {
    font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--text-dim); margin: 0; padding: 10px 12px 6px;
}
.panel section { border-bottom: 1px solid var(--border); padding-bottom: 8px; }
.panel section:last-child { border-bottom: 0; }

/* ===== toolbar ===== */
/* Compact tool grid — 4 per row, no section headers, minimal padding */
.toolbox { padding: 0; border-bottom: 0; }
.tools { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; padding: 2px 4px; }
.tool {
    background: var(--panel-2); border: 1px solid transparent; color: var(--text);
    padding: 4px 2px; cursor: pointer; border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    min-height: 22px;
}
.tool svg { width: 13px; height: 13px; display: block; }
/* Transform tools (select/rotate/scale) — neutral cool tint.
   Draw tools — warm tint. Distinguishes the two groups even with the
   section headers removed. */
.tool[data-tool="select"],
.tool[data-tool="rotate"],
.tool[data-tool="scale"]    { background: #3a2828; }
.tool[data-tool="line"],
.tool[data-tool="rect"],
.tool[data-tool="ellipse"],
.tool[data-tool="polyline"],
.tool[data-tool="freehand"] { background: #3a3528; }
.tool[data-tool="select"]:hover,
.tool[data-tool="rotate"]:hover,
.tool[data-tool="scale"]:hover { background: #4d3535; }
.tool[data-tool="line"]:hover,
.tool[data-tool="rect"]:hover,
.tool[data-tool="ellipse"]:hover,
.tool[data-tool="polyline"]:hover,
.tool[data-tool="freehand"]:hover { background: #4a4030; }
/* Active state still wins (accent blue) regardless of group tint */
.tool.active { background: var(--accent) !important; border-color: var(--accent-hi); }
.tool:hover { border-color: var(--border); }
.tool.active { background: var(--accent); border-color: var(--accent-hi); }
.tool small { font-size: 9px; color: var(--text-dim); }
.tool.active small { color: rgba(255,255,255,.8); }

/* ===== layer panel ===== */
.layers { padding: 4px; max-height: 50vh; overflow-y: auto; }
.layer-row {
    display: grid; grid-template-columns: 14px 14px 1fr 18px; gap: 4px;
    align-items: center; padding: 4px 6px; border-radius: 3px;
    cursor: pointer; margin-bottom: 2px;
}
.layer-row.indented { padding-left: 18px; }
.layer-row.has-selection { box-shadow: inset 2px 0 0 #1177bb; }
.layer-row .sel-count {
    background: #1177bb; color: white; font-size: 9px;
    padding: 1px 5px; border-radius: 8px; font-variant-numeric: tabular-nums;
    justify-self: end;
}

.group-row {
    display: grid; grid-template-columns: 12px 14px 1fr auto; gap: 4px;
    align-items: center; padding: 5px 6px 5px 2px;
    margin: 2px 0; border-radius: 3px; cursor: pointer;
    background: rgba(255,255,255,.02);
}
.group-row:hover { background: rgba(255,255,255,.05); }
.group-row .chevron { color: var(--text-dim); font-size: 10px; text-align: center; }
.group-row .group-name { font-size: 12px; font-weight: 600; text-transform: lowercase;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.group-row .group-count { color: var(--text-dim); font-size: 10px; font-variant-numeric: tabular-nums; padding-right: 4px; }

/* Plot Colors panel */
.pc-row {
    display: grid; grid-template-columns: 22px 1fr 28px 16px; gap: 6px;
    align-items: center; padding: 4px 8px; border-radius: 3px; margin-bottom: 2px;
}
.pc-row:hover { background: var(--panel-2); }
.pc-swatch {
    position: relative; width: 20px; height: 20px;
    border: 1px solid var(--border); border-radius: 3px;
    cursor: pointer; padding: 0;
}
.pc-name {
    background: transparent; border: 0; color: var(--text);
    font-size: 12px; padding: 2px 4px; border-radius: 3px;
    min-width: 0;
}
.pc-name:focus { background: var(--panel-2); outline: 1px solid var(--accent-hi); }
.pc-badge {
    background: var(--panel-2); color: var(--text-dim);
    font-size: 10px; padding: 1px 6px; border-radius: 8px;
    font-variant-numeric: tabular-nums; text-align: center;
}
.pc-del {
    color: var(--text-dim); cursor: pointer; text-align: center; font-size: 13px;
}
.pc-del:hover { color: var(--danger); }
#plotColors .empty { color: var(--text-dim); font-size: 12px; padding: 8px 12px; font-style: italic; }

/* Right-side toolpath layer rows */
.tp-layer-row {
    display: grid; grid-template-columns: 14px 14px 1fr; gap: 6px;
    align-items: center; padding: 4px 8px; border-radius: 3px;
    cursor: pointer; margin-bottom: 2px;
}
.tp-layer-row:hover { background: var(--panel-2); }
.tp-layer-row.selected { background: rgba(17, 119, 187, 0.18); }
.tp-layer-row.active { background: var(--accent); color: white; }
.tp-layer-row.target-editing {
    background: rgba(255, 138, 61, 0.22);
    box-shadow: inset 2px 0 0 #ff8a3d;
}
/* Pen folder "selected" highlight — new + Outline / + Fill paths land
   inside this folder. Distinct from active-toolpath blue so the user
   can tell which folder is the target without confusing it with a
   toolpath selection. */
.group-row.pen-selected {
    background: rgba(255, 138, 61, 0.18);
    box-shadow: inset 2px 0 0 #ff8a3d;
}
/* While target-editing, let clicks fall through the toolpath overlay
   to the SVG shapes underneath, and lift the ghost art's opacity so
   shapes are easy to hit. */
body.target-editing .tp-group,
body.target-editing .tp-group * { pointer-events: none !important; }
body.target-editing [data-layer-id] { opacity: 0.6 !important; }
/* Drag-and-drop visuals for moving toolpaths between pen folders. */
.tp-layer-row.dragging, .group-row.dragging { opacity: 0.5; }
.group-row.drop-target {
    background: rgba(17, 119, 187, 0.32);
    box-shadow: inset 0 0 0 1px var(--accent-hi);
}
/* Drag handle (⋮⋮) shown on every reorderable row. Greyed out by
   default; lights up with a grab cursor on hover so it's obvious
   what's grabbable. */
.drag-handle {
    color: var(--text-dim); cursor: grab;
    font-size: 11px; line-height: 1;
    text-align: center; user-select: none;
}
.drag-handle:hover { color: var(--text); }
.dragging .drag-handle { cursor: grabbing; }
/* Insertion indicator when dropping onto another toolpath row — a thin
   accent-blue bar appears at the top (drop-before) or bottom (drop-after)
   of the target row showing where the dragged item will land. */
.tp-layer-row.drop-before { box-shadow: inset 0 2px 0 var(--accent-hi); }
.tp-layer-row.drop-after  { box-shadow: inset 0 -2px 0 var(--accent-hi); }
.bulk-banner {
    background: rgba(17, 119, 187, 0.22);
    border-left: 2px solid var(--accent-hi);
    color: var(--text); font-size: 11px;
    padding: 6px 10px; margin: 6px 8px 4px;
    border-radius: 3px;
}
.target-edit-banner {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    z-index: 25;
    background: rgba(255, 138, 61, 0.95); color: #1e1e1e;
    border: 1px solid #d56a1f; border-radius: 4px;
    padding: 6px 14px; font-size: 12px; font-weight: 500;
    box-shadow: 0 4px 12px rgba(0,0,0,.45);
    pointer-events: none;
}

/* Cloud / projects panel */
/* Stacked label + full-width input — the URL is too long for the
   1fr 100px .field grid the numeric settings use. */
.cloud-field { padding: 4px 12px; display: flex; flex-direction: column; gap: 4px; }
.cloud-field label { font-size: 11px; color: var(--text-dim); }
#cloudUrl, #cloudKey {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 4px 6px; border-radius: 3px; font-size: 11px; width: 100%;
    font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
}
#cloudUrl:focus, #cloudKey:focus { outline: 1px solid var(--accent-hi); }
.cloud-list { padding: 4px; max-height: 22vh; overflow-y: auto; }
.cloud-row {
    display: grid; grid-template-columns: 1fr auto 18px; gap: 6px;
    align-items: center; padding: 4px 8px; border-radius: 3px;
    cursor: pointer; margin-bottom: 2px; font-size: 12px;
}
.cloud-row:hover { background: var(--panel-2); }
.cloud-row .cloud-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
.cloud-row .cloud-meta { color: var(--text-dim); font-size: 10px; font-variant-numeric: tabular-nums; }
.cloud-row .cloud-del {
    background: transparent; border: 0; color: var(--text-dim);
    font-size: 14px; cursor: pointer; padding: 0;
}
.cloud-row .cloud-del:hover { color: var(--danger); }
.empty { color: var(--text-dim); font-size: 11px; padding: 8px 12px; }
.empty.err { color: #ffb0b6; }

/* Projects / Presets popup — fixed-position popover anchored under the
   button that opened it. cloud-picker.js positions and removes it. */
.preset-popover {
    position: fixed; z-index: 300;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 4px; box-shadow: 0 8px 24px rgba(0,0,0,.55);
    padding: 12px; min-width: 520px; max-width: 760px;
    display: flex; flex-direction: column; gap: 10px;
    max-height: 80vh;
}
.preset-popover .preset-header {
    font-size: 11px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: .08em;
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: baseline;
}
.preset-popover .preset-header .preset-current {
    text-transform: none; letter-spacing: 0; color: var(--text);
    font-size: 11px; font-weight: 500;
}
.preset-popover .preset-actions { display: flex; gap: 6px; }
.preset-popover .preset-actions .btn { flex: 1; }
.preset-popover .preset-actions .btn:disabled { opacity: .4; cursor: not-allowed; }
.preset-popover .preset-list { overflow-y: auto; flex: 1; min-height: 0; }
.preset-popover .preset-row {
    display: grid; grid-template-columns: 1fr auto; gap: 10px;
    align-items: center; padding: 6px 8px; border-radius: 3px;
    font-size: 12px; margin-bottom: 2px;
}
.preset-popover.has-thumbs .preset-row {
    grid-template-columns: 72px 1fr auto;
}
.preset-popover .preset-row:hover { background: var(--panel-2); }
.preset-popover .preset-thumb {
    width: 72px; height: 72px;
    background: var(--canvas-bg); border: 1px solid var(--border);
    border-radius: 3px; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
}
.preset-popover .preset-thumb svg { width: 100%; height: 100%; display: block; }
.preset-popover .preset-name-wrap {
    display: flex; flex-direction: column; gap: 2px; min-width: 0;
}
.preset-popover .preset-name {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    color: var(--text); cursor: pointer; font-size: 13px;
}
.preset-popover .preset-name:hover { color: var(--accent-hi); }
.preset-popover .preset-when {
    color: var(--text-dim); font-size: 10px; font-variant-numeric: tabular-nums;
}
.preset-popover .preset-row-actions { display: flex; gap: 4px; }
.preset-popover .preset-icon-btn {
    background: transparent; border: 1px solid transparent;
    color: var(--text-dim); cursor: pointer; padding: 2px 6px;
    border-radius: 3px; font-size: 13px; line-height: 1;
}
.preset-popover .preset-icon-btn:hover {
    background: var(--panel-2); border-color: var(--border); color: var(--text);
}
.preset-popover .preset-del:hover { color: var(--danger); border-color: var(--danger); }
.preset-popover .preset-empty { color: var(--text-dim); font-size: 11px; padding: 12px; text-align: center; }
.preset-popover .preset-empty.err { color: #ffb0b6; }
.tp-layer-row.indented { padding-left: 20px; }
.tp-layer-row .exp { margin: 0; width: 14px; height: 14px; cursor: pointer; accent-color: var(--accent); }
.tp-layer-row .swatch { width: 12px; height: 12px; border-radius: 2px; border: 1px solid rgba(255,255,255,.2); }
.tp-layer-name { font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.layer-row:hover { background: var(--panel-2); }
.layer-row.active { background: var(--accent); }
.layer-row .swatch {
    width: 14px; height: 14px; border-radius: 2px; border: 1px solid rgba(255,255,255,.2);
    cursor: pointer;
}
.layer-row .vis { color: var(--text-dim); font-size: 12px; cursor: pointer; }
.layer-row .vis:hover { color: var(--text); }
.layer-row .name { font-size: 12px; background: transparent; border: 0; color: inherit;
    width: 100%; padding: 2px; }
.layer-row .name:focus { background: rgba(0,0,0,.3); outline: 1px solid var(--accent-hi); }
.layer-row .del { color: var(--text-dim); cursor: pointer; text-align: center; font-size: 11px; }
.layer-row .del:hover { color: var(--danger); }
.layer-actions { display: flex; gap: 4px; padding: 4px 6px 6px; }
.btn {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 5px 9px; cursor: pointer; font-size: 12px; border-radius: 3px;
}
.btn:hover { background: #3a3a3d; }
.btn.primary { background: var(--accent); border-color: var(--accent-hi); }
.btn.primary:hover { background: var(--accent-hi); }
.btn.primary:disabled { opacity: .5; cursor: not-allowed; }
.btn.danger { color: #ff8a92; border-color: #6a3a3e; }
.btn.danger:hover { background: #4a2a2e; }
.btn:disabled { opacity: .35; cursor: not-allowed; }

/* ===== canvas ===== */
.canvas-wrap {
    background: #2a2a2a; position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
}
/* Canvas now fills the wrap; the doc "paper" is a rect drawn in
   user-space by render.js so it scrolls/zooms with the viewBox. The
   SVG itself has no background — the wrap's dark gray shows through
   the area outside the document. */
.canvas-svg { background: transparent; }
.canvas-svg.tool-line, .canvas-svg.tool-rect, .canvas-svg.tool-ellipse,
.canvas-svg.tool-polyline, .canvas-svg.tool-freehand { cursor: crosshair; }
.canvas-svg.tool-select { cursor: default; }
.canvas-svg.tool-rotate, .canvas-svg.tool-scale { cursor: grab; }
.canvas-svg.panning { cursor: grab; }
/* No `fill` or `stroke-width` here on purpose — let each shape's own
   attributes take effect (CSS rules outrank XML presentation attrs and
   would force fill:none / fixed stroke width on every shape if set).
   The parent <g fill="none" stroke-width=0.3> provides a sensible default
   for un-attributed (user-drawn) shapes. */
.shape { pointer-events: stroke; cursor: pointer; transition: filter 0.06s ease; }
.shape[fill]:not([fill="none"]) { pointer-events: fill; }
.shape.selected { stroke-dasharray: 4 2; }
/* Hover halo — same idea as the toolpath overlay: the shape under the
   cursor pops so the user knows what they'll select. Uses drop-shadow
   so unstroked (fill-only) shapes still get visible feedback. */
.shape:hover { filter: drop-shadow(0 0 0.6px var(--accent-hi)) drop-shadow(0 0 0.4px var(--accent-hi)); }
.preview { stroke: #888; stroke-dasharray: 3 3; fill: none; stroke-width: 0.5; vector-effect: non-scaling-stroke; pointer-events: none; }

/* ===== toolpath overlay hover / active highlights =====
   .tp-group wraps each toolpath in the toolpath/simulation overlay.
   .tp-hit holds invisible click geometry (shape area for fills, thick
   transparent strokes for outlines); .tp-visible holds the drawn lines.
   On :hover the visible strokes pop to make the target obvious. */
/* Hover feedback is a SEPARATE tint layer, not a restyle of the ink.
   .tp-hit (normally-invisible click geometry: the shape interior for
   fills, thick strokes for outlines) is painted in the toolpath colour
   and fades in translucent on hover. The actual pen strokes (.tp-visible)
   stay solid and untouched — what you see is exactly what plots — while
   the tint alone says "you're about to click this". Selection still uses
   the .tp-halo translucent-blue layer drawn underneath (preview.js). */
.tp-hit > * { transition: fill-opacity 0.06s ease, stroke-opacity 0.06s ease; }
.tp-group:hover .tp-hit > * { fill-opacity: 0.3; stroke-opacity: 0.55; }
.status {
    position: absolute; bottom: 8px; left: 8px; right: 8px;
    color: var(--text-dim); font-size: 11px; pointer-events: none;
    display: flex; justify-content: space-between;
}
.status .coords { background: rgba(0,0,0,.5); padding: 3px 6px; border-radius: 3px; }
.help {
    position: absolute; top: 8px; right: 8px;
    color: var(--text-dim); font-size: 10px;
    background: rgba(0,0,0,.5); padding: 4px 8px; border-radius: 3px;
    pointer-events: none; max-width: 260px;
}

/* ===== settings/right panel ===== */
.right { overflow-y: auto; }
.field { padding: 4px 12px; display: grid; grid-template-columns: 1fr 100px; gap: 8px; align-items: center; }
.field label { font-size: 12px; color: var(--text); }
.field label small { color: var(--text-dim); display: block; font-size: 10px; }
.field input[type=number] {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 4px 6px; border-radius: 3px; font-size: 12px; width: 100%;
    font-variant-numeric: tabular-nums;
}
.field input:focus { outline: 1px solid var(--accent-hi); }
.export {
    padding: 12px; margin-top: auto; border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 8px;
}
.import-row { padding: 8px 12px; display: flex; gap: 6px; }

/* ===== toast ===== */
#toast {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 16px; border-radius: 4px;
    box-shadow: 0 4px 16px rgba(0,0,0,.6);
    opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 400;
    max-width: 60vw;
}
#toast.show { opacity: 1; }
#toast.error { border-color: var(--danger); color: #ffb0b6; }

/* drop zone overlay */
.drop-overlay {
    position: absolute; inset: 0; background: rgba(14,99,156,.2);
    border: 2px dashed var(--accent-hi); display: none;
    align-items: center; justify-content: center; pointer-events: none;
    font-size: 18px; color: white; z-index: 50;
}
.drop-overlay.show { display: flex; }

input[type=file] { display: none; }

/* Contextual menus — body[data-mode] is set by preview-controls.js. */
body[data-mode="toolpath"]   .mode-svg-only,
body[data-mode="simulation"] .mode-svg-only { display: none; }
body[data-mode="svg"]        .mode-plot-only,
body[data-mode="svg"]        .mode-toolpath-only { display: none; }
body[data-mode="simulation"] .mode-toolpath-only { display: none; }

/* tool icons */
.tool svg { display: block; }
.tool { color: var(--text); }
.tool.active { color: white; }

/* preview toggles (top-left of canvas) */
/* Small HUD shown during rotate/scale — displays the live value at
   the cursor and accepts a typed exact value (Enter to apply). */
.transform-hud {
    position: absolute; z-index: 30;
    background: rgba(20,20,20,.92); border: 1px solid var(--accent-hi);
    border-radius: 4px; padding: 4px 8px;
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text);
    box-shadow: 0 4px 12px rgba(0,0,0,.5);
    pointer-events: auto;
}
.transform-hud[hidden] { display: none; }
.transform-hud label {
    color: var(--text-dim); text-transform: uppercase;
    letter-spacing: .05em; font-size: 9px;
}
.transform-hud input {
    background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text); padding: 2px 5px; border-radius: 2px;
    width: 64px; font-size: 11px; font-variant-numeric: tabular-nums;
}
.transform-hud span { color: var(--text-dim); font-size: 11px; }
.transform-hud .btn { padding: 2px 8px; font-size: 11px; }

.undo-floating {
    position: absolute; bottom: 32px; left: 8px; display: flex; gap: 4px;
    background: rgba(20,20,20,.85); border: 1px solid var(--border);
    border-radius: 4px; padding: 3px; z-index: 20;
}
.undo-floating .view-toggle {
    min-width: 28px; padding: 4px 8px; font-size: 14px; line-height: 1;
}
.undo-floating .view-toggle:disabled { opacity: .35; cursor: not-allowed; }
.view-toggles {
    position: absolute; top: 8px; left: 8px; display: flex; gap: 4px;
    background: rgba(20,20,20,.85); border: 1px solid var(--border);
    border-radius: 4px; padding: 3px; z-index: 20;
}
.view-toggle {
    background: transparent; border: 0; color: var(--text-dim);
    padding: 4px 10px; cursor: pointer; font-size: 11px; border-radius: 3px;
    text-transform: uppercase; letter-spacing: .05em;
}
.view-toggle:hover { color: var(--text); }
.view-toggle.on { background: var(--accent); color: white; }

/* stats line (bottom strip) */
.status #stats { font-variant-numeric: tabular-nums; }

/* active-layer panel — compact field layout with select dropdowns */
#activeLayerContent .field { grid-template-columns: 1fr 110px; padding: 3px 12px; }
#activeLayerContent select {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 4px 6px; border-radius: 3px; font-size: 12px; width: 100%;
}
#activeLayerContent select:focus { outline: 1px solid var(--accent-hi); }
#activeLayerContent .subhead {
    font-size: 10px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: .06em;
    padding: 8px 12px 2px;
}
#activeLayerContent .empty,
#styleContent .empty {
    color: var(--text-dim); font-size: 12px; padding: 8px 12px; font-style: italic;
}
#styleContent .field { padding: 4px 12px; }
.paint-swatches {
    display: flex; gap: 4px; align-items: center;
}
.swatch-btn {
    position: relative; width: 24px; height: 22px; padding: 0;
    border: 1px solid var(--border); border-radius: 3px;
    cursor: pointer; background: var(--panel-2);
}
.swatch-btn:hover { border-color: var(--text-dim); }
.swatch-btn.active { border-color: var(--accent-hi); box-shadow: 0 0 0 1px var(--accent-hi); }
.none-swatch {
    background-color: white;
    background-image: linear-gradient(to top right,
        transparent calc(50% - 1.5px),
        #c4444f calc(50% - 1.5px), #c4444f calc(50% + 1.5px),
        transparent calc(50% + 1.5px));
}
.paint-status {
    font-size: 11px; color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.mixed-swatch {
    background-image:
        repeating-linear-gradient(45deg, #888 0 4px, #ccc 4px 8px);
}

/* Swatch-based picker popover: None + custom-color + preset grid + hex. */
.paint-popover {
    position: fixed; z-index: 200;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 4px; padding: 8px;
    box-shadow: 0 6px 18px rgba(0,0,0,.5);
    display: flex; flex-direction: column; gap: 8px;
    width: 188px;
}
.paint-popover-row { display: flex; gap: 6px; }
.paint-popover-tile { width: 24px; height: 24px; position: relative; }
.paint-popover-tile.active {
    border-color: var(--accent-hi); box-shadow: 0 0 0 1px var(--accent-hi);
}
.paint-popover-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px;
}
.custom-swatch {
    background: conic-gradient(
        red, orange, yellow, lime, cyan, blue, magenta, red);
}
.paint-popover-hex {
    background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text); font-size: 12px; padding: 4px 6px;
    width: 100%; border-radius: 3px; font-family: ui-monospace, monospace;
}
</style>
<script src="https://apploader.pages.dev/fred-host.js" defer></script>
</head>
<body>
<div id="app">
    <!-- LEFT: tools + layers -->
    <div class="panel">
        <section style="border-bottom: 1px solid var(--border); padding: 6px 6px 4px; display: flex; gap: 6px; align-items: center;">
            <span data-fred-home-mount></span>
            <button class="btn" id="projectBtn" title="Save / open / delete full project (SVG + toolpaths + plot colors + settings)" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;">
                <svg viewBox="0 0 18 18" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 5.5 L2 14 L16 14 L16 7 L9 7 L7.5 5.5 Z"/>
                </svg>
                <span>Projects</span>
            </button>
        </section>
        <section style="border-bottom: 1px solid var(--border); padding: 6px;">
            <button class="btn primary" id="importBtn" style="width: 100%;">Import SVG…</button>
            <input type="file" id="importFile" accept=".svg,image/svg+xml">
        </section>
        <section class="toolbox">
            <div class="tools" id="allTools">
                <button class="tool active" data-tool="select" title="Select (V) — click a shape; drag empty area for marquee; shift to add">
                    <svg viewBox="0 0 18 18" width="14" height="14" fill="currentColor">
                        <path d="M4 2 L4 14 L7.2 11.2 L9.4 15.5 L11.4 14.5 L9.3 10.3 L13 10.3 Z"/>
                    </svg>

                </button>
                <button class="tool mode-svg-only" data-tool="rotate" title="Rotate — drag a shape to rotate around its center">
                    <!-- Simple 3/4 circular arrow — minimal rotate icon -->
                    <svg viewBox="0 0 18 18" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14.5 9 A 5.5 5.5 0 1 1 9 3.5"/>
                        <polyline points="11.5,1.5 9,3.5 11,6"/>
                    </svg>

                </button>
                <button class="tool mode-svg-only" data-tool="scale" title="Scale (S) — drag a shape to scale from its center">
                    <!-- Diagonal double-headed arrow (NE/SW) — universal resize -->
                    <svg viewBox="0 0 18 18" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3.5" y1="14.5" x2="14.5" y2="3.5"/>
                        <polyline points="3.5,9.5 3.5,14.5 8.5,14.5"/>
                        <polyline points="9.5,3.5 14.5,3.5 14.5,8.5"/>
                    </svg>

                </button>
                <button class="tool mode-svg-only" data-tool="rect" title="Rectangle (R)">
                    <svg viewBox="0 0 18 18" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
                        <rect x="3" y="4.5" width="12" height="9" rx="0.5"/>
                    </svg>

                </button>
                <button class="tool mode-svg-only" data-tool="ellipse" title="Ellipse (E)">
                    <svg viewBox="0 0 18 18" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
                        <ellipse cx="9" cy="9" rx="6" ry="5"/>
                    </svg>

                </button>
                <button class="tool mode-svg-only" data-tool="polyline" title="Polyline (P) — Enter to finish">
                    <svg viewBox="0 0 18 18" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="2,14 6,5 10,11 15,3"/>
                        <circle cx="2" cy="14" r="1.2" fill="currentColor" stroke="none"/>
                        <circle cx="6" cy="5" r="1.2" fill="currentColor" stroke="none"/>
                        <circle cx="10" cy="11" r="1.2" fill="currentColor" stroke="none"/>
                        <circle cx="15" cy="3" r="1.2" fill="currentColor" stroke="none"/>
                    </svg>

                </button>
                <button class="tool mode-svg-only" data-tool="freehand" title="Freehand (F)">
                    <svg viewBox="0 0 18 18" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <path d="M2 12 C 4 6, 6 15, 8 9 S 12 4, 14 10 S 16 14, 16 14"/>
                    </svg>

                </button>
            </div>
        </section>
        <section id="stylePanel" class="mode-svg-only">
            <h2>Style (selected)</h2>
            <div id="styleContent"></div>
        </section>
        <section style="flex: 1; display: flex; flex-direction: column; min-height: 0;">
            <h2>Layers</h2>
            <div class="layers" id="layers"></div>
            <div class="layer-actions">
                <button class="btn" id="addLayer">+ Layer</button>
                <button class="btn danger" id="clearLayer" title="Clear active layer">Clear</button>
            </div>
        </section>
        <section>
            <h2>Document</h2>
            <div class="field">
                <label>Width <small>mm</small></label>
                <input type="number" id="docW" min="10" max="2000" step="1" value="200">
            </div>
            <div class="field">
                <label>Height <small>mm</small></label>
                <input type="number" id="docH" min="10" max="2000" step="1" value="200">
            </div>
        </section>
    </div>

    <!-- CENTER: canvas -->
    <div class="canvas-wrap" id="canvasWrap">
        <svg class="canvas-svg tool-select" id="canvas" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="drop-overlay" id="dropOverlay">Drop SVG to import</div>

        <div class="view-toggles">
            <button class="view-toggle on" id="toggleSvg" title="Show the artwork">SVG</button>
            <button class="view-toggle" id="toggleToolpath" title="Show the exact toolpath the plotter will draw">Toolpath</button>
            <button class="view-toggle" id="toggleSimPens" title="Render toolpath strokes at their actual pen width">Pen widths</button>
        </div>

        <!-- Transform HUD — shows the live angle/factor while rotating or
             scaling, and lets the user type an exact value. Hidden by
             default; interaction.js positions and fills it. -->
        <div id="transformHud" class="transform-hud" hidden>
            <label id="transformHudLabel">angle</label>
            <input id="transformHudInput" type="number" step="0.1">
            <span id="transformHudUnit">°</span>
            <button class="btn primary" id="transformHudOk" title="Apply">OK</button>
            <button class="btn" id="transformHudCancel" title="Revert">Cancel</button>
        </div>

        <div class="undo-floating">
            <button class="view-toggle" id="undoBtn" title="Undo (Ctrl+Z)" disabled>↶</button>
            <button class="view-toggle" id="redoBtn" title="Redo (Ctrl+Shift+Z)" disabled>↷</button>
        </div>

        <div class="help">Pan: space + drag · Zoom: scroll · Delete: Del · Polyline finish: Enter or double-click</div>
        <div class="status">
            <span id="docInfo"></span>
            <span id="stats"></span>
            <span class="coords" id="coords">0.00, 0.00 mm</span>
        </div>
    </div>

    <!-- RIGHT: toolpath / plot settings + export -->
    <div class="panel right">
        <section class="mode-plot-only">
            <h2>Plot Colors (pens)</h2>
            <div id="plotColors" style="padding: 4px; max-height: 22vh; overflow-y: auto;"></div>
            <div class="layer-actions">
                <button class="btn" id="addPlotColor" title="Add a pen" style="flex:1;">+ Pen</button>
                <button class="btn" id="savePalette" title="Save current palette to cloud" style="flex:1;">Save</button>
                <button class="btn" id="loadPalette" title="Load a palette from cloud" style="flex:1;">Load</button>
            </div>
        </section>
        <section class="mode-plot-only">
            <h2>Toolpath Operations</h2>
            <div id="toolpathLayers" style="padding: 4px; max-height: 30vh; overflow-y: auto;"></div>
            <div class="layer-actions" style="margin-bottom: 4px;">
                <button class="btn" id="addOutlineTp" style="flex:1;">+ Outline</button>
                <button class="btn" id="addFillTp" style="flex:1;">+ Fill</button>
            </div>
            <div class="layer-actions">
                <button class="btn" id="exportAll" title="Select every toolpath for export" style="flex:1;">Select all</button>
                <button class="btn" id="exportNone" title="Deselect every toolpath" style="flex:1;">Deselect all</button>
            </div>
        </section>
        <section id="activeLayerPanel" class="mode-plot-only">
            <h2>Active Toolpath</h2>
            <div id="activeLayerContent"></div>
        </section>
        <section class="mode-toolpath-only">
            <h2>Plotter Settings</h2>
            <div class="field">
                <label>Pen up Z <small>mm clear of paper</small></label>
                <input type="number" id="penUpZ" step="0.1" value="5">
            </div>
            <div class="field">
                <label>Pen down Z <small>mm (negative = overtravel)</small></label>
                <input type="number" id="penDownZ" step="0.1" value="-1">
            </div>
            <div class="field">
                <label>Draw feed <small>mm/min XY</small></label>
                <input type="number" id="drawFeed" step="100" value="2000">
            </div>
            <div class="field">
                <label>Z feed <small>mm/min for lift/lower</small></label>
                <input type="number" id="zFeed" step="100" value="1000">
            </div>
            <div class="field">
                <label>Simplify tolerance <small>mm</small></label>
                <input type="number" id="tol" step="0.01" value="0.1">
            </div>
        </section>
        <div class="export">
            <button class="btn primary" id="exportBtn">Export G-code (.zip)</button>
            <small style="color: var(--text-dim); text-align: center;">One .gcode per toolpath</small>
        </div>
    </div>
</div>

<div id="toast"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
