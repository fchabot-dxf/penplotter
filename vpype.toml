# vpype configuration for the Ultimate Bee + DDCS Expert M350 pen plotter.
#
# Usage:
#     vpype --config vpype.toml read in.svg \
#         linemerge linesort linesimplify \
#         gwrite -p ddcs out.gcode
#
# For one-file-per-layer output, use plot.ps1 (wraps `forlayer` + gwrite).
#
# =========================================================================
# HARDWARE TUNING — edit the values inside the templates below.
#
# All values currently use PLACEHOLDERS (PEN-UP Z = 5, PEN-DOWN Z = -1,
# DRAW FEED = 2000, Z FEED = 1000). Measure on the actual plotter once the
# spring-loaded pen mount is installed, then replace the four numbers in
# each occurrence (header, segment_first, line_end, document_end).
#
#   PEN-UP Z      — Z height (mm) clear of paper / jigs / registration pins.
#   PEN-DOWN Z    — Z height (mm) at the paper, plus overtravel for the
#                   spring (start ~ -1 to -2 mm past Z=0 at paper surface).
#   DRAW FEED     — XY feedrate (mm/min) while drawing. Start 2000, push up.
#   Z FEED        — Z feedrate (mm/min) for pen lift/lower. Start 1000.
#
# DDCS notes:
#   - No G10, no G28 (per the controller's documented quirks).
#   - Parens for comments (matches the Fusion DDCS post).
#   - Always emit X and Y on move lines (the Fusion post forces XYZ output
#     for "M350 DDCS compatibility"; gwrite always emits both via template).
#   - M30 ends the program.
# =========================================================================

[gwrite.ddcs]
unit = "mm"
vertical_flip = true
info = "Ultimate Bee + DDCS Expert M350 pen plotter. Edit Z heights / feeds in vpype.toml."

document_start = """(--- DDCS pen plotter program ---)
(Generated by vpype-gcode profile 'ddcs')
G21 (mm)
G90 (absolute)
G17 (XY plane)
G94 (feed per min)
G1 Z5.000 F1000 (pen up to safe Z)
"""

layer_start = "(--- layer {layer_id} ---)\n"

segment_first = """G0 X{x:.3f} Y{y:.3f} (rapid to stroke start)
G1 Z-1.000 F1000 (pen down)
"""

segment = "G1 X{x:.3f} Y{y:.3f} F2000\n"

line_end = "G1 Z5.000 F1000 (pen up)\n"

document_end = """G1 Z5.000 F1000 (final pen up)
M30
"""
