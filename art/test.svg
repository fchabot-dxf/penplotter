<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     width="100mm" height="100mm" viewBox="0 0 100 100">
  <g inkscape:groupmode="layer" inkscape:label="black" id="layer1" stroke="black" fill="none" stroke-width="0.3">
    <polyline points="10,10 90,10 90,90 10,90 10,10"/>
    <polyline points="20,20 80,20 50,80 20,20"/>
  </g>
  <g inkscape:groupmode="layer" inkscape:label="red" id="layer2" stroke="red" fill="none" stroke-width="0.3">
    <line x1="10" y1="50" x2="90" y2="50"/>
    <line x1="50" y1="10" x2="50" y2="90"/>
  </g>
</svg>
